# Multi-site Nginx configuration for a single VPS.
#
# Deploy target:
#   /etc/nginx/sites-available/default
#
# Host routing:
#   server.key-ching.com  -> 127.0.0.1:2999  (SSL already issued)
#   server.faceblurr.com -> 127.0.0.1:3000 and /py -> 127.0.0.1:5000
#   server.prolifer8.com   -> 127.0.0.1:4000
#   server.iotachat.app   -> 127.0.0.1:8000  (SSL via certbot - see Phase 2 below)
#
# *** server.iota-chat.com has been retired (replaced by server.iotachat.app) ***

# --- HTTP -> HTTPS redirect (domains with active certs) ---
server {
    listen 80;
    listen [::]:80;
    server_name server.key-ching.com server.faceblurr.com server.prolifer8.com;
    return 301 https://$host$request_uri;
}

# --- PHASE 1: HTTP-only block for server.iotachat.app ---
# Keep this until certbot has issued the certificate, then replace with
# the HTTPS block in Phase 2 further below. Once the cert is live,
# switch the location / block to a redirect and uncomment the SSL server.
server {
    listen 80;
    listen [::]:80;
    server_name server.iotachat.app;

    # Let certbot's webroot challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Temporarily proxy over plain HTTP until cert is ready
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.key-ching.com;

    ssl_certificate /etc/letsencrypt/live/server.key-ching.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.key-ching.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:2999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.faceblurr.com;

    ssl_certificate /etc/letsencrypt/live/server.faceblurr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.faceblurr.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    location /py {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.prolifer8.com;

    ssl_certificate /etc/letsencrypt/live/server.prolifer8.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.prolifer8.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
